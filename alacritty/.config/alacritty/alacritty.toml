# Alacritty Config - Catppuccin Frappé

[font]
normal.family = "FiraCode Nerd Font"
size = 14.0

[colors.primary]
background = "#303446"
foreground = "#c6d0f5"

[colors.selection]
text = "#303446"
background = "#f2d5cf"

[colors.normal]
black = "#51576d"
red = "#e78284"
green = "#a6d189"
yellow = "#e5c890"
blue = "#8caaee"
magenta = "#f4b8e4"
cyan = "#81c8be"
white = "#b5bfe2"

[colors.bright]
black = "#626880"
red = "#e78284"
green = "#a6d189"
yellow = "#e5c890"
blue = "#8caaee"
magenta = "#f4b8e4"
cyan = "#81c8be"
white = "#a5adce"

[scrolling]
history = 10000

[mouse]
hide_when_typing = true